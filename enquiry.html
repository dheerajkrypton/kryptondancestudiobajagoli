<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Krypton Dance Studio – Enquiry</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>

<body>
<div class="dynamic-bg"></div>
  <div class="enquiry-page">

    <h2>ENQUIRY FORM</h2>

  <form class="enquiry-form" id="enquiryForm">

  <label>Full Name*</label>
  <input type="text" id="name" required>

  <label>Email Address*</label>
  <input type="email" id="email" required>

  <label>Contact*</label>
  <input type="tel" id="contact" required>

  <label>Choose Our Service*</label>
  <select id="service" required>
    <option value="">Choose</option>
    <option>Enroll for Class</option>
    <option>Book Us for an Event</option>
  </select>

  <label>Comments / Questions*</label>
  <textarea rows="4" id="message" required></textarea>

  <button type="submit">SUBMIT</button>

</form>


  </div>

</body>
</html>
